<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mount Builder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="book-container">
      <header class="book-header">
        <h1 class="book-title">Mount Builder</h1>
        <time class="verse=reference" id="currentDate" datetime=""></time>
      </header>

      <div class="pages" role="main">
        <article class="page left-page">
          <form class="page-content" aria-label="sermon details">
            <section class="field-group">
              <label class="visually-hidden" for="title">Sermon Title</label>
              <input
                type="text"
                id="title"
                name="title"
                class="sermon-title"
                placeholder="title"
                aria-label="Sermon Title"
              />
            </section>

            <section class="field-group">
              <label for="mainText" class="visually-hidden"
                >Main Scripture Text</label
              >
              <input
                type="text"
                id="mainText"
                class="main-scripture"
                placeholder="Main Scripture"
                aria-label="Main Scripture reference"
              />
            </section>
          </form>
        </article>
      </div>
    </main>
  </body>
</html>
